name: Auto Forecast

on:
  schedule:
    - cron: '0 11 * * *'   # jam 18 WIB
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
    
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python packages
      run: |
        pip install selenium pillow pytesseract

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr chromium-browser chromium-chromedriver

    - name: Run script
      run: |
        python dago.py
        python jatinangor.py
        python cirebon.py

    - name: Commit CSV ke repo
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
    
        git add *.csv
        git commit -m "update forecast data" || echo "no changes"
        git push
        
    - name: Upload CSV hasil
      uses: actions/upload-artifact@v4
      with:
        name: forecast-data
        path: "*.csv"
